name: Docker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/yanpitangui/rinha-de-backend-2026-q1
  IMAGE_LB: ghcr.io/yanpitangui/rinha-de-backend-2026-q1-lb

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download references.json.gz from contest repo
        run: |
          wget -q -O resources/references.json.gz \
            https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/references.json.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push LB
        uses: docker/build-push-action@v6
        with:
          context: ./lb
          file: ./Dockerfile.lb
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_LB }}:latest
            ${{ env.IMAGE_LB }}:${{ github.sha }}
          cache-from: type=gha,scope=lb
          cache-to: type=gha,mode=max,scope=lb
